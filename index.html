<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBERIA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">CYBERIA</a>

  <div class="nav-right">
    <ul class="nav-links">
      <li><a href="#">EVENTS</a></li>
      <li><a href="#">TICKETS</a></li>
      <li><a href="#">ABOUT</a></li>
      <li><a href="#">CONTACT</a></li>
    </ul>
  </div>
</nav>

<!-- HOME -->
<div id="page-home" class="page active">
  <section class="hero">
    <img src="assets/hero.jpg" alt="Hero">
  </section>
</div>

<!-- EVENTS -->
<div class="inner-page">
  <div class="page-hero">
    <h1 class="page-hero-title">EVENTS</h1>
  </div>

  <div class="page-content">
    <div class="events-list">

      <div class="event-row">
        <div class="event-row-date">APR 12</div>
        <div class="event-row-name">CYBERIA NIGHT</div>
        <div class="event-row-location">Montreal</div>
        <div class="event-row-cta">
          <a class="btn" href="#">Tickets</a>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ABOUT -->
<div class="inner-page">
  <div class="page-hero">
    <h1 class="page-hero-title">ABOUT</h1>
  </div>

  <div class="page-content">
    <p class="about-text">
      Cyberia is an underground electronic music experience focused on high-production events and immersive environments.
    </p>
  </div>
</div>

<!-- CONTACT -->
<div class="inner-page">
  <div class="page-hero">
    <h1 class="page-hero-title">CONTACT</h1>
  </div>

  <div class="page-content">
    <div class="contact-layout">

      <div class="contact-info">
        <h3>Get in touch</h3>
        <p>For bookings and inquiries.</p>
      </div>

      <form class="contact-form">
        <input class="form-input" placeholder="Name">
        <input class="form-input" placeholder="Email">
        <textarea class="form-textarea" placeholder="Message"></textarea>
      </form>

    </div>
  </div>
</div>

</body>
</html>
