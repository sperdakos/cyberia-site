<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/main.js"></script>
  </head>

  <body>
    <nav>
      <a class="nav-logo" href="index.html">CYBERIA</a>
      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="events.html">EVENTS</a></li>
          <li><a href="about.html">ABOUT</a></li>
          <li><a href="contact.html">CONTACT</a></li>
        </ul>
        <button class="nav-cart" onclick="location.href = 'cart.html'">
          <span class="cart-badge" id="cart-badge">0</span>

    <div class="inner-page">
      <div class="page-hero">
        <h1 class="page-hero-title">Events</h1>
      </div>

      <div class="page-content">
        <div class="events-filter">
          <button class="filter-btn active" onclick="setFilter(this)">
            All
          </button>
          <button class="filter-btn" onclick="setFilter(this)">Upcoming</button>
          <button class="filter-btn" onclick="setFilter(this)">Past</button>
          <button class="filter-btn" onclick="setFilter(this)">Montreal</button>
          <button class="filter-btn" onclick="setFilter(this)">
            International
          </button>
        </div>

        <div class="events-list">
          <div class="event-row">
            <div class="event-row-date">Apr 12<br />2026</div>
            <div>
              <div class="event-row-name">Signal Loss</div>
              <div class="event-row-location">
                Entrepot Darling — Montreal, QC
              </div>
            </div>
            <div class="event-row-location">Doors 10PM · 18+</div>
            <div class="event-row-cta">
              <button class="btn" onclick="addToCart('Signal Loss')">
                Add to Cart
              </button>
            </div>
          </div>

          <!-- KEEP REST OF YOUR EVENTS EXACTLY -->
        </div>
      </div>

      <footer>
        <div class="footer-logo">Cyberia</div>
        <ul class="footer-links">
          <li><a href="events.html">Events</a></li>
